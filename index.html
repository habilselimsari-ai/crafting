<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftingNetwork | Kırmızı Sezon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-red: #ff3333; /* Senin imza kırmızın */
            --dark-bg: #080808;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Poppins', sans-serif; 
            background: var(--dark-bg); 
            color: white; 
            overflow: hidden; 
        }

        /* Arka Plan - Attığın Fotoğrafın Kırmızı Silüet Versiyonu */
        .hero {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.85)), 
                        url('https://w.wallhaven.cc/full/85/wallhaven-85196y.png');
            background-size: cover; 
            background-position: center;
            text-align: center;
        }

        /* Logo Alanı */
        .logo-area { animation: fadeInDown 1s ease; }
        h1 { 
            font-size: 6.5rem; font-weight: 900; margin: 0; 
            color: white; letter-spacing: -4px; 
            text-shadow: 0 0 40px rgba(255, 51, 51, 0.6); 
        }
        .tagline { 
            font-size: 1.1rem; letter-spacing: 15px; 
            color: var(--accent-red); margin-top: -10px; 
            text-transform: uppercase; font-weight: bold;
        }

        /* IP Kopyalama Butonu (RushCraft Tarzı) */
        .ip-box {
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            padding: 22px 70px; 
            border-radius: 100px;
            border: 2px solid var(--accent-red);
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.15);
        }

        .ip-box:hover { 
            transform: scale(1.08); 
            background: var(--accent-red); 
            box-shadow: 0 0 50px rgba(255, 51, 51, 0.4);
        }

        .ip-box:hover .ip-text { color: white; }
        .ip-text { font-size: 1.9rem; font-weight: 900; color: var(--accent-red); transition: 0.3s; }

        /* Alt Butonlar */
        .menu { display: flex; gap: 20px; margin-top: 60px; }
        .menu-item {
            padding: 14px 40px; border-radius: 8px; font-weight: 700;
