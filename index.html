<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftingNetwork | Kırmızı Sezon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3333; --dark: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Poppins', sans-serif; 
            background: var(--dark); 
            color: white; 
            overflow: hidden; 
        }

        /* ARKA PLAN - Yüksek Kaliteli Kızıl Minecraft Dağları */
        .hero {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://images.alphacoders.com/132/1327533.png');
            background-size: cover; 
            background-position: center;
            text-align: center;
            position: relative;
        }

        /* RushCraft Tarzı Logo */
        .header-area { animation: fadeInDown 1.2s ease; }
        h1 { 
            font-size: clamp(3rem, 10vw, 7.5rem); 
            font-weight: 900; margin: 0; 
            color: white; letter-spacing: -5px; 
            text-shadow: 0 0 50px rgba(255, 51, 51, 0.7);
        }
        .tagline { 
            font-size: 1.2rem; letter-spacing: 20px; 
            color: var(--primary); margin-top: -15px; 
            text-transform: uppercase; font-weight: bold;
        }

        /* IP KUTUSU - Tıklayınca Parlayan Modern Tasarım */
        .ip-box {
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 22px 75px; border-radius: 100px;
            border: 3px solid var(--primary);
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.2);
        }

        .ip-box:hover { 
            transform: scale(1.08); 
            background: var(--primary); 
            box-shadow: 0 0 60px var(--primary);
        }
        .ip-text { font-size: 2rem; font-weight: 900; color: var(--primary); transition: 0.3s; }
        .ip-box:hover .ip-text { color: white; }

        /* Butonlar */
        .nav-links { display: flex; gap: 20px; margin-top: 60px; }
        .btn {
            padding: 15px 45px; border-radius: 12px; font-weight: 700;
            text-decoration: none; color: white; text-transform: uppercase;
            transition: 0.3s; border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }
        .btn:hover { background: white; color: black; transform: translateY(-5px); }
        .btn-store { background: var(--primary); border: none; }

        #player-count { margin-top: 25px; font-size: 1rem; color: #888; font-weight: bold; letter-spacing: 5px; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="header-area">
            <h1>CRAFTING</h1>
            <div class="tagline">NETWORK</div>
        </div>

        <div class="ip-box" onclick="copyIP()">
            <div class="ip-text">PLAY.CRAFTINGNETWORK.COM</div>
        </div>
        <div id="player-count">DURUM SORGULANIYOR...</div>

        <div class="nav-links">
            <a href="https://discord.gg/DAVET" class="btn">DISCORD</a>
            <a href="#" class="btn btn-store">MAĞAZA</a>
            <a href="#" class="btn">REHBER</a>
        </div>
    </div>

    <script>
        function copyIP() {
            const temp = document.createElement('textarea');
            temp.value = 'play.craftingnetwork.com';
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            alert("🔥 IP Kopyalandı! Kırmızı sezona bekliyoruz.");
        }

        // Canlı Oyuncu API'si
        fetch('https://api.mcstatus.io/v2/status/java/play.craftingnetwork.com')
            .then(res => res.json())
            .then(data => {
                const el = document.getElementById('player-count');
                if(data.online) {
                    el.innerText = `AKTİF: ${data.players.online} OYUNCU`;
                    el.style.color = "#ff3333";
                } else {
                    el.innerText = "SUNUCU ŞU AN BAKIMDA";
                }
            });
    </script>
</body>
</html>
