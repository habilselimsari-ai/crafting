<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CraftingNetwork | Kırmızı Sezon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: #000; overflow: hidden; }

        /* ARKA PLAN BURASI - Dosya adını tam olarak senin dediğin gibi yaptım */
        .hero {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('5467719.png');
            background-size: cover; background-position: center;
            text-align: center;
        }

        h1 { font-size: 7vw; color: white; text-shadow: 0 0 30px #ff0000; letter-spacing: -2px; }
        .sub { font-size: 1.5vw; color: #ff3333; letter-spacing: 15px; margin-top: -10px; text-transform: uppercase; }

        .ip-box {
            margin-top: 40px; padding: 20px 60px; border-radius: 100px;
            border: 3px solid #ff3333; background: rgba(255,0,0,0.1);
            cursor: pointer; transition: 0.3s;
        }
        .ip-box:hover { background: #ff3333; transform: scale(1.05); }
        .ip-text { font-size: 2vw; font-weight: 900; color: #ff3333; transition: 0.3s; }
        .ip-box:hover .ip-text { color: white; }

        .btns { display: flex; gap: 20px; margin-top: 50px; }
        .btn {
            padding: 15px 40px; border-radius: 10px; text-decoration: none; color: white;
            font-weight: bold; background: rgba(255,255,255,0.1); border: 1px solid #ff3333; transition: 0.3s;
        }
        .btn:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>CRAFTING</h1>
        <div class="sub">NETWORK</div>

        <div class="ip-box" onclick="copyIP()">
            <div class="ip-text">PLAY.CRAFTINGNETWORK.COM</div>
        </div>

        <div class="btns">
            <a href="#" class="btn">DISCORD</a>
            <a href="#" class="btn">MAĞAZA</a>
        </div>
    </div>

    <script>
        function copyIP() {
            const el = document.createElement('textarea');
            el.value = 'play.craftingnetwork.com';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("IP Kopyalandı!");
        }
    </script>
</body>
</html>
