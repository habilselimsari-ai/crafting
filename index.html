<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftingNetwork | En Kaliteli Survival</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #f1c40f; /* Altın Sarısı */
            --secondary-color: #000000;
            --accent-color: #ff9f43;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--secondary-color);
            color: white; overflow-x: hidden;
        }

        /* RushCraft Tarzı Hareketli Arka Plan */
        .hero {
            position: relative;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.5)), url('https://wallpaperaccess.com/full/127116.jpg');
            background-size: cover; background-position: center;
            text-align: center;
        }

        /* Logo ve Başlık Alanı */
        .content { animation: fadeInDown 1.5s ease; }

        h1 {
            font-size: 5rem; font-weight: 900; margin: 0;
            background: linear-gradient(to bottom, #fff, var(--primary-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .subtitle { font-size: 1.2rem; letter-spacing: 5px; color: #ccc; margin-top: -10px; text-transform: uppercase; }

        /* IP Kopyalama Alanı */
        .ip-container {
            margin-top: 40px;
            background: rgba(255,255,255,0.05);
            padding: 15px 30px; border-radius: 15px;
            border: 1px solid rgba(241, 196, 15, 0.3);
            cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .ip-container:hover {
            background: rgba(241, 196, 15, 0.1);
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        .ip-text { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); }
        .online-count { font-size: 0.9rem; color: #00ff00; margin-top: 5px; }

        /* RushCraft Stil Butonlar */
        .btn-group { display: flex; gap: 20px; margin-top: 50px; }

        .btn {
            padding: 15px 40px; border-radius: 8px; font-weight: bold;
            text-decoration: none; color: white; text-transform: uppercase;
            transition: 0.4s; position: relative; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .btn-store { background: var(--primary-color); color: black; border: none; }
        .btn-discord { background: #7289da; border: none; }

        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); filter: brightness(1.2); }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="content">
            <h1>CRAFTING</h1>
            <div class="subtitle">NETWORK • SURVIVAL</div>
        </div>

        <div class="ip-container" onclick="copyIP()">
            <div class="ip-text">PLAY.CRAFTINGNETWORK.COM</div>
            <div class="online-count" id="statusText">Sunucu Aktif • 0 Oyuncu</div>
        </div>

        <div class="btn-group">
            <a href="https://discord.gg/linkin" class="btn btn-discord">DISCORD</a>
            <a href="/magaza" class="btn btn-store">MAĞAZA</a>
            <a href="#hakkimizda" class="btn">HAKKIMIZDA</a>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.craftingnetwork.com");
            alert("IP Adresi Kopyalandı! Oyuna bekliyoruz.");
        }

        // Oyuncu Sayısını Çekme
        fetch('https://api.mcstatus.io/v2/status/java/play.craftingnetwork.com')
            .then(res => res.json())
            .then(data => {
                const status = document.getElementById('statusText');
                if(data.online) {
                    status.innerHTML = `SUNUCU AKTİF • ${data.players.online} OYUNCU`;
                } else {
                    status.innerHTML = "SUNUCU ŞU AN BAKIMDA";
                    status.style.color = "red";
                }
            });
    </script>
</body>
</html>
