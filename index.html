<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftingNetwork | Kırmızı Sezon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff3333; --dark: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Poppins', sans-serif; 
            background: var(--dark); 
            color: white; 
            overflow: hidden; 
        }

        /* ARKA PLAN - YENİ VE GÜVENLİ LİNK */
        .hero {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('https://wallpapercave.com/wp/wp12065842.jpg');
            background-size: cover; 
            background-position: center;
            text-align: center;
        }

        h1 { 
            font-size: clamp(3rem, 10vw, 7rem); font-weight: 900; margin: 0; 
            color: white; letter-spacing: -4px; 
            text-shadow: 0 0 40px rgba(255, 51, 51, 0.8); 
        }
        
        .tagline { 
            font-size: 1.2rem; letter-spacing: 15px; 
            color: var(--red); margin-top: -10px; 
            text-transform: uppercase; font-weight: bold;
        }

        .ip-box {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 20px 60px; border-radius: 100px;
            border: 3px solid var(--red);
            cursor: pointer; transition: 0.4s;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.2);
        }

        .ip-box:hover { transform: scale(1.05); background: var(--red); box-shadow: 0 0 50px var(--red); }
        .ip-text { font-size: 1.8rem; font-weight: 900; color: var(--red); transition: 0.3s; }
        .ip-box:hover .ip-text { color: white; }

        .nav { display: flex; gap: 20px; margin-top: 50px; }
        .btn {
            padding: 14px 40px; border-radius: 10px; font-weight: 700;
            text-decoration: none; color: white; text-transform: uppercase;
            transition: 0.3s; border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
        }
        .btn:hover { background: white; color: black; transform: translateY(-5px); }
        .store-btn { background: var(--red); border: none; }

        #status { margin-top: 25px; font-size: 1rem; color: #888; font-weight: bold; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>CRAFTING</h1>
        <div class="tagline">NETWORK</div>

        <div class="ip-box" onclick="copyIP()">
            <div class="ip-text">PLAY.CRAFTINGNETWORK.COM</div>
        </div>
        <div id="status">DURUM SORGULANIYOR...</div>

        <div class="nav">
            <a href="https://discord.gg/DAVET" class="btn">DISCORD</a>
            <a href="#" class="btn store-btn">MAĞAZA</a>
            <a href="#" class="btn">WIKI</a>
        </div>
    </div>

    <script>
        function copyIP() {
            const el = document.createElement('textarea');
            el.value = 'play.craftingnetwork.com';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("🔥 IP Kopyalandı! Kırmızı sezona bekliyoruz.");
        }

        fetch('https://api.mcstatus.io/v2/status/java/play.craftingnetwork.com')
            .then(res => res.json())
            .then(data => {
                const s = document.getElementById('status');
                if(data.online) {
                    s.innerText = `AKTİF: ${data.players.online} OYUNCU`;
                    s.style.color = "#ff3333";
                } else { s.innerText = "SUNUCU BAKIMDA"; }
            });
    </script>
</body>
</html>
