<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftingNetwork | Kırmızı Sezon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff3333; --dark: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: var(--dark); color: white; overflow: hidden; }

        .hero {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            /* Arka plan resmini doğrudan güvenilir bir linkle değiştirdim */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), 
                        url('https://w.wallhaven.cc/full/85/wallhaven-85196y.png');
            background-size: cover; background-position: center;
            text-align: center;
        }

        h1 { font-size: 6rem; font-weight: 900; color: white; text-shadow: 0 0 40px var(--red); letter-spacing: -4px; }
        .tagline { font-size: 1.1rem; letter-spacing: 15px; color: var(--red); text-transform: uppercase; margin-bottom: 40px; }

        .ip-box {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 20px 60px; border-radius: 100px; border: 2px solid var(--red);
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }
        .ip-box:hover { transform: scale(1.05); background: var(--red); }
        .ip-text { font-size: 1.8rem; font-weight: 900; color: var(--red); transition: 0.3s; }
        .ip-box:hover .ip-text { color: white; }

        .menu { display: flex; gap: 20px; margin-top: 50px; }
        .btn {
            padding: 12px 35px; border-radius: 8px; font-weight: 700; text-decoration: none; 
            color: white; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); transition: 0.3s;
        }
        .btn:hover { background: white; color: black; transform: translateY(-3px); }
        .store { background: var(--red); border: none; }

        #status { margin-top: 25px; font-size: 1rem; color: #888; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>CRAFTING</h1>
        <div class="tagline">NETWORK</div>

        <div class="ip-box" onclick="copyIP()">
            <div class="ip-text">PLAY.CRAFTINGNETWORK.COM</div>
        </div>
        <div id="status">SUNUCU SORGULANIYOR...</div>

        <div class="nav menu">
            <a href="https://discord.gg/linkin" class="btn">DISCORD</a>
            <a href="#" class="btn store">MAĞAZA</a>
            <a href="#" class="btn">HAKKIMIZDA</a>
        </div>
    </div>

    <script>
        function copyIP() {
            const el = document.createElement('textarea');
            el.value = 'play.craftingnetwork.com';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("🔥 IP Kopyalandı!");
        }

        fetch('https://api.mcstatus.io/v2/status/java/play.craftingnetwork.com')
            .then(res => res.json())
            .then(data => {
                const s = document.getElementById('status');
                if(data.online) {
                    s.innerText = `AKTİF: ${data.players.online} OYUNCU`;
                    s.style.color = "#ff3333";
                } else { s.innerText = "SUNUCU BAKIMDA"; }
            });
    </script>
</body>
</html>
