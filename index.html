<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftingNetwork | Profesyonel Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff3333; --glass: rgba(0, 0, 0, 0.75); --dark-bg: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; scroll-behavior: smooth; }

        /* 1. EKRAN (GİRİŞ) */
        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.85)), url('5467719.png');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        .navbar {
            position: absolute; top: 0; width: 100%; padding: 25px 8%;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 10;
        }
        .logo { font-size: 1.6rem; font-weight: 800; }
        .logo span { color: var(--accent); }

        .main-content { text-align: center; z-index: 5; animation: fadeIn 1.2s ease; }
        h1 { font-size: clamp(3rem, 7vw, 6rem); font-weight: 800; margin-bottom: 10px; }
        
        .ip-copy {
            background: var(--glass); border: 2px solid var(--accent);
            padding: 15px 40px; border-radius: 8px; cursor: pointer;
            transition: 0.4s; margin-top: 30px; display: inline-block;
        }
        .ip-copy:hover { background: var(--accent); transform: scale(1.05); }

        /* 2. EKRAN (AÇIKLAMA BÖLÜMÜ - RUSH STYLE) */
        .info-section {
            padding: 100px 10%;
            background: var(--dark-bg);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            border-top: 4px solid var(--accent);
        }

        .info-card {
            background: rgba(255,255,255,0.03);
            padding: 40px;
            border-radius: 15px;
            border-left: 5px solid var(--accent);
            transition: 0.3s;
        }
        .info-card:hover { background: rgba(255,255,255,0.07); transform: translateY(-10px); }
        .info-card h3 { color: var(--accent); font-size: 1.5rem; margin-bottom: 15px; text-transform: uppercase; }
        .info-card p { color: #bbb; line-height: 1.6; font-size: 1rem; }

        /* SCROLL İNDİKATÖRÜ */
        .scroll-down {
            position: absolute; bottom: 30px;
            animation: bounce 2s infinite;
            cursor: pointer; color: var(--accent); font-size: 2rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">CRAFTING<span>NETWORK</span></div>
    </nav>

    <div class="hero">
        <div class="main-content">
            <h1>CRAFTING NETWORK</h1>
            <p style="letter-spacing: 5px; color: var(--accent); font-weight: bold;">TÜRKİYE'NİN EN ADALETLİ SUNUCUSU</p>

                <strong style="font-size: 1.5rem;">PLAY.C
