<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CraftingNetwork | Kırmızı Sezon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        /* ARKA PLAN - SADECE SENİN DOSYANI OKUR */
        .hero {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            /* DOSYA ADI BURADA, BAŞKA HİÇBİR YERE BAKMAZ */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('5467719.png');
            background-size: cover; 
            background-position: center;
            text-align: center;
        }

        h1 { font-size: 8rem; color: #fff; text-shadow: 0 0 40px #ff0000; margin-bottom: 0; }
        .tag { font-size: 1.5rem; color: #ff3333; letter-spacing: 15px; text-transform: uppercase; margin-top: -15px; font-weight: bold; }

        .ip-box {
            margin-top: 50px; padding: 20px 70px; border: 3px solid #ff3333; 
            background: rgba(0,0,0,0.6); color: #ff3333; border-radius: 100px;
            cursor: pointer; font-size: 2rem; font-weight: 900; transition: 0.3s;
        }
        .ip-box:hover { background: #ff3333; color: #fff; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>CRAFTING</h1>
        <div class="tag">NETWORK</div>
        <div class="ip-box" onclick="alert('IP Kopyalandı!')">PLAY.CRAFTINGNETWORK.COM</div>
    </div>
</body>
</html>
