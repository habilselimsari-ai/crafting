<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CraftingNetwork | Kırmızı Sezon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        /* ARKA PLAN - Dosya adın neyse o gelmeli */
        .hero {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            /* EĞER DOSYANIN SONU .jpg İSE AŞAĞIDAKİ .png YERİNE .jpg YAZ */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('5467719.png');
            background-size: cover; 
            background-position: center;
            text-align: center;
        }

        h1 { font-size: 8rem; color: white; text-shadow: 0 0 50px #ff0000; margin-bottom: 10px; }
        
        .ip-box {
            padding: 20px 60px; border: 3px solid #ff3333; 
            background: rgba(0,0,0,0.6); color: #ff3333;
            cursor: pointer; font-size: 2rem; font-weight: bold;
            border-radius: 100px; transition: 0.3s;
        }
        .ip-box:hover { background: #ff3333; color: white; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>CRAFTING</h1>
        <div class="ip-box" onclick="alert('IP Kopyalandı!')">PLAY.CRAFTINGNETWORK.COM</div>
    </div>
</body>
</html>
