<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftingNetwork | Kırmızı Sezon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff3333; --dark: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Poppins', sans-serif; 
            background: var(--dark); 
            color: white; 
            overflow: hidden; 
        }

        /* İŞTE O ARKA PLAN - Bu link asla patlamaz, en sağlamı bu */
        .hero {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.85)), 
                        url('https://images.alphacoders.com/132/1327533.png');
            background-size: cover; 
            background-position: center;
            text-align: center;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { 
            font-size: clamp(3rem, 10vw, 7.5rem); font-weight: 900; margin: 0; 
            color: white; letter-spacing: -5px; 
            text-shadow: 0 0 50px rgba(255, 51, 51, 0.7); 
        }
        
        .tagline { 
            font-size: 1.2rem; letter-spacing: 20px; 
            color: var(--red); margin-top: -15px; 
            text-transform: uppercase; font-weight: bold;
        }
