<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftingNetwork | Profesyonel Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ff3333; --bg-dark: rgba(0, 0, 0, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Montserrat', sans-serif; background: #000; color: white; overflow-x: hidden; }

        /* RUSH-STYLE BACKGROUND */
        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('5467719.png');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        /* ÜST MENÜ (NAVBAR) */
        .navbar {
            position: absolute; top: 0; width: 100%; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--main-color); }

        /* ANA BAŞLIK ALANI */
        .content { text-align: center; z-index: 2; animation: fadeInUp 1s ease; }
        h1 { font-size: 6rem; font-weight: 900; letter-spacing: -2px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 10px; }
        .subtitle { font-size: 1.2rem; color: var(--main-color); font-weight: 700; letter-spacing: 10px; text-transform: uppercase; margin-bottom: 40px; }

        /* IP KUTUSU - MODERN VERSİYON */
        .copy-ip {
            background: var(--bg-dark); border: 2px solid var(--main-color);
            padding: 15px 40px; border-radius: 5px; cursor: pointer;
            transition: 0.4s; display: inline-block;
        }
        .copy-ip:hover { background: var(--main-color); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,51,51,0.3); }
        .copy-ip span { display: block; font-size: 0.7rem; color: #ccc; text-transform: uppercase; }
        .copy-ip strong { font-size: 1.5rem; color: #fff; }

        /* BUTONLAR */
        .btn-group { margin-top: 30px; display: flex; gap: 15px; }
        .btn {
            padding: 12px 35px; border-radius: 5px; text-decoration: none; font-weight: 700;
            text-transform: uppercase; transition: 0.3s; border: 2px solid white; color: white;
        }
        .btn-red { background: var(--main-color); border-color: var(--main-color); }
        .btn:hover { transform: scale(1.05); background: white; color: black; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="hero">
        <nav class="navbar">
            <div class="logo" style="font-weight: 900; font-size: 1.5rem;">CRAFTING<span style="color: var(--main-color);">NET</span></div>
            <div class="nav-links">
                <a href="#">Ana Sayfa</a>
                <a href="#">Mağaza</a>
                <a href="#">Forum</a>
                <a href="#">Wiki</a>
            </div>
        </nav>

        <div class="content">
            <h1>CRAFTING</h1>
            <div class="subtitle">Efsane Yeniden Başlıyor</div>

            <div class="copy-ip" onclick="copyIP()">
                <span>Tıkla ve IP Kopyala</span>
                <strong>PLAY.CRAFTINGNETWORK.COM</strong>
            </div>

            <div class="btn-group">
                <a href="https://discord.gg/linkin" class="btn btn-red">Discord'a Katıl</a>
                <a href="#" class="btn">Sıralama</a>
            </div>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText('play.craftingnetwork.com');
            alert("🔥 Sunucu adresi başarıyla kopyalandı!");
        }
    </script>
</body>
</html>
